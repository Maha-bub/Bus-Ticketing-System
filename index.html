<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Bus Ticketing System</title>

    <!-- Tailwind css cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI setup -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section class="max-w-6xl mx-auto px-6 py-6">
      <!-- nav menu section design -->
      <div class="flex items-center justify-between mb-3">
        <h1 class="text-3xl font-extrabold text-black">P-Ticket</h1>

        <ul
          class="flex bg-[#9cdfa3] px-10 py-2 rounded hidden md:flex items-center gap-12 text-gray-500 font-medium"
        >
          <li><a class="hover:text-black transition" href="#">Home</a></li>
          <li><a class="hover:text-black transition" href="#">About</a></li>
          <li>
            <a class="hover:text-black transition" href="#">Destination</a>
          </li>
          <li><a class="hover:text-black transition" href="#">Buses</a></li>
        </ul>
        <div>
          <button class="btn bg-[#9cdfa3]">
            Bus
            <span class="text-black"
              ><img class="" src="images/bus-icon.png" alt=""
            /></span>
          </button>
        </div>
      </div>
    </section>

    <!-- Hero section or Banner section -->
    <section
      class="max-w-6xl mx-auto px-6 py-6 relative h-[520px] bg-[url(images/banner.png)] bg-cover rounded-3xl bg-center flex items-center justify-center text-center"
    >
      <div class="absolute inset-0 bg-black/20 rounded-3xl"></div>

      <div class="relative z-10 max-w-3xl px-6">
        <h1 class="text-white text-6xl font-extrabold leading-tight">
          End-to-End Travel with
        </h1>

        <h2 class="text-lime-500 text-6xl font-extrabold mt-2">P Paribahan</h2>

        <p class="text-white/90 mt-6 text-lg leading-8">
          Yes, you can run unit tests and view the results directly within the
          app. The integrated testing features allow for a streamlined
        </p>

        <button
          class="btn btn-soft btn-success mt-8 transition text-black font-bold px-8 py-4 rounded-xl"
        >
          Buy Tickets
        </button>
      </div>
    </section>

    <div class="relative -mt-10 z-20">
      <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
        <!-- Card -->
        <div
          class="bg-white rounded-3xl border-b-4 border-lime-400 p-8 shadow-sm flex items-center gap-5"
        >
          <div class="flex gap-5">
            <img class="h-20" src="images/people.png" alt="" />

            <div>
              <h2 class="text-4xl font-extrabold">500K+</h2>
              <p class="text-gray-500 mt-1">Registered users</p>
            </div>
          </div>
        </div>
        <div
          class="bg-white rounded-3xl border-b-4 border-lime-400 p-8 shadow-sm flex items-center gap-5"
        >
          <div class="flex gap-5">
            <img class="h-20" src="images/ticket-cupon.png" alt="" />

            <div>
              <h2 class="text-4xl font-extrabold">1.7 lacks</h2>
              <p class="text-gray-500 mt-1">Tickets sold</p>
            </div>
          </div>
        </div>

        <!-- Card -->
        <div
          class="bg-white rounded-3xl border-b-4 border-lime-400 p-8 shadow-sm flex items-center gap-5"
        >
          <div class="flex gap-5">
            <img class="h-20" src="images/stoppage.png" alt="" />

            <div>
              <h2 class="text-4xl font-extrabold">80K+</h2>
              <p class="text-gray-500 mt-1">Rental partners</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
